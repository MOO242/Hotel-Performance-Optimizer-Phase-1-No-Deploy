booking_id:
  type: int
  required: true
  unique: true


booking_date:
  type: date
  required: true
  rules : 
  - "booking_date <= check_in_date"

check_in_date:
  type: date
  required: true
  rules:
  - "check_in_date < checkout_date"


checkout_date:
  type: date
  required: true
  rules:
  - "checkout_date > check_in_date"


no_guests:
  type: int
  required: true
  rules:
  - "no_guests >= 1"
  - "no_guests <= 6"

room_category:
  type: str 
  required: true
  allowed_values:
  - RT1
  - RT2
  - RT3
  - RT4    

booking_platform:
  type: str
  required: true
  allowed_values:
    - direct online
    - direct offline
    - logtrip
    - tripster
    - makeyourtrip
    - journey
    - others

ratings_given:
  type: int
  required: false
  allowed_values:
    - 1
    - 2
    - 3
    - 4
    - 5
  
revenue_generated:
  type: float
  required: true
  rules:
    - "revenue_generated >= 0"

revenue_realized:
  type: float
  required: true
  rules:
    - "revenue_realized >= 0"

room_rate:
  type: float
  required: true
  rules:
    - "room_rate > 0"

nights:
  type: int
  required: true
  rules:
    - "nights >= 1"
